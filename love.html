<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Poppins", Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    color:white;
    background:linear-gradient(135deg,#090014,#25002f,#ff2e63);
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#ff4d8d;
    filter:blur(140px);
    border-radius:50%;
    top:-150px;
    left:-120px;
    opacity:.8;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#7b2cff;
    filter:blur(150px);
    border-radius:50%;
    bottom:-150px;
    right:-120px;
    opacity:.8;
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:650px;
    padding:45px 30px;
    border-radius:35px;
    background:rgba(255,255,255,0.13);
    border:1px solid rgba(255,255,255,0.35);
    backdrop-filter:blur(22px);
    box-shadow:0 30px 90px rgba(0,0,0,.45);
    animation:show 1.2s ease;
}

@keyframes show{
    from{
        opacity:0;
        transform:scale(.8) translateY(40px);
    }
    to{
        opacity:1;
        transform:scale(1) translateY(0);
    }
}

.big-heart{
    font-size:90px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.18);}
}

h1{
    margin-top:15px;
    font-size:46px;
    text-shadow:0 0 25px rgba(255,255,255,.6);
}

p{
    margin-top:20px;
    font-size:22px;
    line-height:1.8;
    color:#ffe9f3;
}

.special{
    margin-top:25px;
    padding:18px;
    border-radius:22px;
    background:rgba(255,255,255,.15);
    font-size:24px;
    font-weight:bold;
    color:#fff;
    box-shadow:inset 0 0 30px rgba(255,255,255,.15);
}

button{
    margin-top:30px;
    padding:14px 32px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff2e63;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.heart{
    position:absolute;
    bottom:-40px;
    font-size:25px;
    animation:floatUp 6s linear infinite;
    opacity:.7;
}

@keyframes floatUp{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:.8;
    }
    to{
        transform:translateY(-110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="big-heart">💖</div>

    <h1>I knew it...</h1>

    <p>
        I was waiting for this answer.<br>
        And now I just want to say something...
    </p>

    <div class="special">
        You are not just special...<br>
        You are the reason behind my smile ✨
    </div>

    <p>
        Since you pressed YES,<br>
        this heart is officially yours 💌
    </p>

    <button onclick="location.href='index.html'">Back</button>
</div>

<script>
function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["❤️","💖","💕","💘","💗"][Math.floor(Math.random()*5)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 4) + "s";
    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },7000);
}

setInterval(createHeart,250);
</script>

</body>
</html>
