<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;

    background:
        radial-gradient(circle at 50% 20%, rgba(255,0,80,0.4), transparent 40%),
        radial-gradient(circle at 50% 90%, rgba(255,0,80,0.3), transparent 60%),
        linear-gradient(#000,#14000a);
}

/* glow */
body::before{
    content:"";
    position:absolute;
    width:600px;height:600px;
    background:#ff0055,red;
    filter:blur(140px);
    border-radius:50%;
    top:-150px;
    left:50%;
    transform:translateX(-50%);
    opacity:.5;
}

canvas{
    position:fixed;
    inset:0;
}

/* M داخل القلب */
.bigM{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:70px;
    font-weight:bold;
    color:rgba(255,255,255,0.85);
    text-shadow:0 0 15px #ff006e;
    z-index:2;
}

/* text */
.text{
    position:absolute;
    bottom:140px;
    font-size:28px;
    color:#ff4d8d;
    text-shadow:0 0 20px #ff006e;
}

/* buttons */
.buttons{
    position:absolute;
    bottom:50px;
    display:flex;
    gap:20px;
}

button{
    border:none;
    padding:15px 45px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:all .3s ease;
}

.yes{
    background:#ff006e;
    color:white;
    box-shadow:0 0 25px #ff006e;
}

.yes:hover{
    transform:scale(1.1);
}

.no{
    background:white;
    color:#ff006e;
}

/* rain hearts */
.heart{
    position:absolute;
    top:-20px;
    animation:fall linear infinite;
    color:#ff2e78;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="bigM">M</div>

<div class="text">Do you love me?</div>

<div class="buttons">
    <button class="yes" onclick="goLove()">Yes</button>
    <button class="no" id="noBtn">No</button>
</div>

<script>
/* زر NO */
const noBtn = document.getElementById("noBtn");

function moveNo(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.position="fixed";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";
}

noBtn.addEventListener("mouseenter", moveNo);

/* YES */
function goLove(){
    window.location.href = "love.html";
}

/* قلوب تمطر */
function rain(){
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*20)+"px";
    h.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
}
setInterval(rain,200);

/* canvas */
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
const N=1200;

/* heart equation */
function heart(t){
    return {
        x:16*Math.sin(t)**3,
        y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
    };
}

/* إنشاء القلب */
function createHeart(){
    particles=[];
    const cx=canvas.width/2;
    const cy=canvas.height/2; // 👈 نفس مركز M
    const scale=canvas.height/45;

    for(let i=0;i<N;i++){
        let t=(i/N)*Math.PI*2;
        let p=heart(t);

        let spread=Math.random()*0.7+0.3;

        let tx=cx+p.x*scale*spread;
        let ty=cy-p.y*scale*spread;

        particles.push({
            tx,ty,
            x:tx,
            y:ty,
            vx:(Math.random()-0.5)*4,
            vy:(Math.random()-0.5)*4
        });
    }
}

createHeart();

let time=0;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    time+=0.03;
    let k=(Math.sin(time)+1)/2;

    for(let p of particles){
        let ex=p.tx+p.vx*20;
        let ey=p.ty+p.vy*20;

        let tx=p.tx*(1-k)+ex*k;
        let ty=p.ty*(1-k)+ey*k;

        p.x+=(tx-p.x)*0.15;
        p.y+=(ty-p.y)*0.15;

        ctx.fillStyle="#ff2e78";
        ctx.shadowBlur=8;
        ctx.shadowColor="#ff006e";
        ctx.fillRect(p.x,p.y,2,2);
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
