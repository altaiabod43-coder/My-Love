<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    background:linear-gradient(135deg,#ff4d8d,#ff006e,#ff85a2);
}

body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#ff0055;
    filter:blur(80px);
    border-radius:50%;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    opacity:.35;
}

canvas{
    position:fixed;
    inset:0;
}

.bigM{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:65px;
    font-weight:bold;
    color:rgba(255,255,255,0.9);
    text-shadow:0 0 12px #ff006e;
    z-index:2;
}

.text{
    position:absolute;
    bottom:140px;
    font-size:28px;
    color:white;
    text-shadow:0 0 12px #ff006e;
    z-index:3;
}

.buttons{
    position:absolute;
    bottom:50px;
    display:flex;
    gap:20px;
    z-index:3;
}

button{
    border:none;
    padding:15px 45px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
    transition:all .3s ease;
}

.yes{
    background:#ff006e;
    color:white;
    box-shadow:0 0 18px #ff006e;
}

.yes:hover{
    transform:scale(1.08);
}

.no{
    background:white;
    color:#ff006e;
}

.heart{
    position:absolute;
    top:-20px;
    animation:fall linear infinite;
    color:#ff2e78;
    z-index:1;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div class="bigM">M</div>

<div class="text">Do you love me?</div>

<div class="buttons">
    <button class="yes" onclick="goLove()">Yes</button>
    <button class="no" id="noBtn">No</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

function moveNo(){
    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("click", moveNo);

function goLove(){
    window.location.href = "love.html";
}

/* قلوب تمطر أخف للموبايل */
function rain(){
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (14 + Math.random() * 14) + "px";
    h.style.animationDuration = (3 + Math.random() * 2) + "s";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 5000);
}

setInterval(rain, window.innerWidth < 600 ? 700 : 350);

/* canvas */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let particles = [];
let time = 0;

/* على الموبايل أقل، على اللابتوب أكثر */
const N = window.innerWidth < 600 ? 380 : 900;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    createHeart();
}

window.addEventListener("resize", resizeCanvas);

function heart(t){
    return {
        x:16 * Math.sin(t) ** 3,
        y:13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)
    };
}

function createHeart(){
    particles = [];

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const scale = canvas.height / 45;

    for(let i = 0; i < N; i++){
        let t = (i / N) * Math.PI * 2;
        let p = heart(t);
        let spread = Math.random() * 0.7 + 0.3;

        let tx = cx + p.x * scale * spread;
        let ty = cy - p.y * scale * spread;

        particles.push({
            tx, ty,
            x: tx,
            y: ty,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3
        });
    }
}

function draw(){
    ctx.fillStyle = "rgba(255, 0, 110, 0.13)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    time += 0.03;
    let k = (Math.sin(time) + 1) / 2;

    for(let p of particles){
        let ex = p.tx + p.vx * 18;
        let ey = p.ty + p.vy * 18;

        let tx = p.tx * (1-k) + ex * k;
        let ty = p.ty * (1-k) + ey * k;

        p.x += (tx - p.x) * 0.14;
        p.y += (ty - p.y) * 0.14;

        ctx.fillStyle = "#ff2e78";
        ctx.fillRect(p.x, p.y, 1.6, 1.6);
    }

    requestAnimationFrame(draw);
}

resizeCanvas();
draw();
</script>

</body>
</html>
